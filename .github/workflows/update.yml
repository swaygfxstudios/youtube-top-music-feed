name: YouTube Music Video Chart

on:
  # Every Friday at 12:00 PM UTC
  schedule:
    - cron: "0 18 * * 5"

  # Allow manual runs from the GitHub Actions page
  workflow_dispatch:

jobs:
  update-chart:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Music Video Chart
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node src/fetch.js
